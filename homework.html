<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Claude Code介绍</title>
    <style>
        /* 1. 标签选择器 */
        body {
            font-size: 16px;
            line-height: 1.8;
            color: #333333;
        }
        h2 {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.8;
        }
        p {
            text-indent: 2em;
            line-height: 1.8;
        }
        ul {
            /* 列表使用图片作为项目标号，10px大小图标 */
            list-style-image: url("微信.png");
            line-height: 1.8;
        }

        /* 2. ID选择器 主标题 */
        #main-title {
            font-size: 30px;
            text-align: center;
            font-weight: bold;
            color: #2b78e4;
            line-height: 1.8;
            border-bottom: 1px solid #2b78e4;
            padding-bottom: 10px;
        }

        /* 3. 类选择器 */
        .highlight {
            font-weight: bold;
            background-color: #f1c40f;
        }
    </style>
</head>
<body>
    <!-- 1个主标题 -->
    <h1 id="main-title">Claude Code —— 智能AI编程助手</h1>

    <!-- 第1个小标题 -->
    <h2>什么是Claude Code？</h2>
    <!-- 第1段正文 -->
    <p>
       Claude Code是由Anthropic公司推出的<span class="highlight">AI编程助手</span>，可以帮助初学者快速写代码、查错误、学逻辑，非常适合新手学习。
    </p >

    <!-- 第2个小标题 -->
    <h2>Claude Code 核心优势</h2>
    <!-- 无序列表（图片标号） -->
    <ul>
        <li>支持HTML、CSS、JavaScript、Python等多种语言</li>
        <li>智能代码提示与自动修复</li>
        <li>代码逻辑详细讲解</li>
        <li>免费使用基础功能</li>
        <li>界面简洁、容易上手</li>
    </ul>

    <!-- 第2段正文 -->
    <p>
        如果你正在学习编程，<span class="highlight">Claude Code</span> 会是你学习路上非常好的帮手，随时解答你的编程问题。
    </p >
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>第三章作业-蓝色播放按钮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 页面蓝色渐变背景 */
        body {
            width: 100vw;
            height: 100vh;
            /* 蓝色系渐变背景 */
            background: linear-gradient(135deg, #1a237e, #42a5f5, #90caf9);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 外层圆角卡片 */
        .outer-box {
            width: 320px;
            height: 320px;
            background-color: #283593;
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0,50,150,0.3);
        }
        /* 黑色内层框 */
        .inner-box {
            width: 220px;
            height: 220px;
            background-color: #121212;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 内部浅蓝渐变 */
            background-image: linear-gradient(45deg, #4285f4, #81d4fa);
        }
        /* 白色圆形播放圈 */
        .play-circle {
            width: 120px;
            height: 120px;
            background-color: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 播放三角 */
        .play-triangle {
            width: 0;
            height: 0;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-left: 40px solid #121212;
        }
    </style>
</head>
<body>
    <div class="outer-box">
        <div class="inner-box">
            <div class="play-circle">
                <div class="play-triangle"></div>
            </div>
        </div>
    </div>
</body>
</html>
